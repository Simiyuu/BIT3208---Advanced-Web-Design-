<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteKeeper — Reset Password</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="logo">Note<span>Keeper</span></div>
</header>

<div id="authScreen">
  <div class="auth-box">
    <h2>Reset Password</h2>
    <p>Enter your new password below.</p>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="••••••••" oninput="checkStrength(this.value)" />
      <div id="strengthBar"><div id="strengthFill"></div></div>
      <div id="strengthLabel"></div>
    </div>
    <div style="margin-top:1.5rem">
      <button class="btn-primary" style="width:100%" onclick="resetPassword()">Set New Password →</button>
    </div>
    <div id="resetMsg" class="error-msg"></div>
  </div>
</div>

<script>
  function getToken() {
    return new URLSearchParams(window.location.search).get('token');
  }

  async function resetPassword() {
    const newPassword = document.getElementById('newPass').value;
    const msg = document.getElementById('resetMsg');
    const token = getToken();

    if (!newPassword) {
      msg.style.color = 'var(--danger)';
      msg.textContent = 'Please enter a new password';
      return;
    }

    const res = await fetch('http://127.0.0.1:3000/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword })
    });
    const data = await res.json();

    if (res.ok) {
      msg.style.color = 'var(--accent)';
      msg.textContent = '✓ ' + data.message;
      setTimeout(() => window.location.href = '/', 2000);
    } else {
      msg.style.color = 'var(--danger)';
      msg.textContent = data.error;
    }
  }

  function checkStrength(password) {
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (password.length >= 8) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;
    if (password.length === 0) { fill.style.width = '0%'; label.textContent = ''; return; }
    if (score <= 1) { fill.style.width = '33%'; fill.style.background = '#ff5f5f'; label.textContent = 'Weak'; label.style.color = '#ff5f5f'; }
    else if (score <= 3) { fill.style.width = '66%'; fill.style.background = '#f0c040'; label.textContent = 'Medium'; label.style.color = '#f0c040'; }
    else { fill.style.width = '100%'; fill.style.background = '#c8f060'; label.textContent = 'Strong'; label.style.color = '#c8f060'; }
  }
</script>
</body>
</html>
